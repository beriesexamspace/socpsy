<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />

<style>
  :root{
    --bg:#f4f2ee; --bg2:#ebe8e2; --card:#ffffff; --ink:#1b232c; --muted:#5d6873;
    --line:#e2ddd4; --accent:#0f6e6a; --accent-ink:#0b4f4c; --accent-soft:#dcefed;
    --amber:#c9821f; --amber-soft:#f7ecd9; --violet:#6d5bd0; --violet-soft:#e9e6fa;
    --good:#1f8a4c; --good-soft:#e2f3e8; --bad:#c23b54; --bad-soft:#fbe5ea;
    --shadow:0 1px 2px rgba(20,30,40,.05),0 6px 18px rgba(20,30,40,.05);
    --shadow-lg:0 2px 6px rgba(20,30,40,.06),0 18px 40px rgba(20,30,40,.10);
    --r:14px; --r-lg:20px; --ease:cubic-bezier(.2,.8,.2,1);
  }
  html[data-theme="dark"]{
    --bg:#11151a; --bg2:#161b22; --card:#1b222b; --ink:#e7ecf1; --muted:#9aa6b2;
    --line:#2a323c; --accent:#3fb9b2; --accent-ink:#7fd6d0; --accent-soft:#163230;
    --amber:#e0a64a; --amber-soft:#2e2515; --violet:#a99cf0; --violet-soft:#221d3a;
    --good:#46c178; --good-soft:#16301f; --bad:#ef6b82; --bad-soft:#331620;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4),0 22px 48px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-size:16px;line-height:1.55;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:Georgia,"Iowan Old Style","Times New Roman",serif;letter-spacing:-.01em}
  button,a{font-family:inherit;cursor:pointer;color:inherit}
  .wrap{max-width:880px;margin:0 auto;padding:0 18px 96px}
  :focus-visible{outline:2.5px solid var(--accent);outline-offset:2px;border-radius:8px}
  .ic{width:1.25em;height:1.25em;flex:none;vertical-align:-.18em;stroke:currentColor;stroke-width:1.75;
    stroke-linecap:round;stroke-linejoin:round;fill:none}

  header.top{position:sticky;top:0;z-index:30;border-bottom:1px solid var(--line);
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:saturate(160%) blur(16px);-webkit-backdrop-filter:saturate(160%) blur(16px);box-shadow:inset 0 -1px 0 0 rgba(0,0,0,.04)}
  .topin{max-width:880px;margin:0 auto;padding:10px 18px;display:flex;align-items:center;gap:12px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700}
  .logo{width:32px;height:32px;border-radius:10px;background:linear-gradient(145deg,var(--accent),var(--accent-ink));
    color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:16px;flex:none;
    box-shadow:0 2px 6px rgba(15,110,106,.35)}
  .brand small{display:block;font-weight:500;color:var(--muted);font-size:11px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;min-height:38px;
    padding:7px 11px;font-size:13.5px;display:inline-flex;gap:7px;align-items:center;text-decoration:none;
    transition:border-color .2s var(--ease),transform .12s var(--ease)}
  .iconbtn:hover{border-color:var(--accent)} .iconbtn:active{transform:scale(.96)}
  nav.tabs{display:flex;gap:2px;overflow:auto;max-width:880px;margin:0 auto;padding:6px 12px 0;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{border:none;background:none;color:var(--muted);padding:10px 13px;border-radius:9px 9px 0 0;
    font-size:14px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:6px;transition:color .2s var(--ease)}
  nav.tabs button .ic{width:16px;height:16px}
  nav.tabs button.on{color:var(--accent-ink);border-bottom-color:var(--accent)}
  nav.tabs button:hover{color:var(--ink)}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .pad{padding:20px}
  .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink)}
  .pill.amber{background:var(--amber-soft);color:var(--amber)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:14px}
  @media(min-width:620px){.g2{grid-template-columns:1fr 1fr}}

  .hero{display:flex;flex-wrap:wrap;align-items:center;gap:16px;margin:20px 0 8px}
  .count{flex:none;background:linear-gradient(150deg,var(--accent),var(--accent-ink));color:#fff;border-radius:var(--r);padding:14px 20px;text-align:center;min-width:118px;box-shadow:0 8px 20px rgba(15,110,106,.28)}
  .count b{font-family:Georgia,serif;font-size:32px;display:block;line-height:1}
  .count span{font-size:12px;opacity:.92}
  .herotext h1{margin:0 0 4px;font-size:25px}
  .herotext p{margin:0;color:var(--muted)}

  .brandstrip{display:flex;align-items:center;gap:13px;width:100%;text-decoration:none;color:inherit;border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:12px 16px;margin:14px 0 2px;box-shadow:var(--shadow);transition:border-color .2s var(--ease),transform .15s var(--ease)}
  .brandstrip:hover{border-color:var(--accent);transform:translateY(-1px)}
  .brandstrip .bs-logo{width:36px;height:36px;border-radius:10px;flex:none;display:grid;place-items:center;color:#fff;font-family:Georgia,serif;font-weight:700;font-size:17px;background:linear-gradient(145deg,var(--accent),var(--accent-ink))}
  .brandstrip .bs-txt{flex:1;min-width:0} .brandstrip .bs-txt b{display:block;font-size:14.5px} .brandstrip .bs-txt small{color:var(--muted);font-size:12.5px}
  .brandstrip .bs-go{color:var(--accent-ink);flex:none;display:inline-flex} .brandstrip .bs-go .ic{width:18px;height:18px}

  .seclabel{display:flex;align-items:center;gap:8px;margin:24px 0 12px;font-weight:700;font-size:15px}
  .seclabel .ic{width:18px;height:18px;color:var(--accent-ink)}
  .backlink{display:inline-flex;align-items:center;gap:5px;border:none;background:none;color:var(--muted);font-size:13.5px;font-weight:600;padding:6px 0;margin-bottom:4px;transition:color .2s var(--ease)}
  .backlink:hover{color:var(--accent-ink)} .backlink .ic{width:16px;height:16px}
  .tracks{display:grid;gap:14px} @media(min-width:600px){.tracks{grid-template-columns:1fr 1fr}}
  .track{display:flex;flex-direction:column;gap:8px;text-align:left;width:100%;border:1.5px solid var(--line);background:var(--card);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow);transition:transform .22s var(--ease),border-color .22s var(--ease),box-shadow .22s var(--ease)}
  .track:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--shadow-lg)} .track:active{transform:translateY(-1px) scale(.995)}
  .track .tile{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;margin-bottom:4px;background:linear-gradient(150deg,var(--accent),var(--accent-ink))}
  .track.alt .tile{background:linear-gradient(150deg,var(--violet),#4f40a8)} .track .tile .ic{width:24px;height:24px}
  .track b{font-size:18px} .track small{color:var(--muted);font-size:13.5px;line-height:1.5}
  .track .go{margin-top:6px;display:inline-flex;align-items:center;gap:6px;color:var(--accent-ink);font-weight:600;font-size:13.5px} .track.alt .go{color:var(--violet)} .track .go .ic{width:16px;height:16px}
  .toggle{width:48px;height:28px;border-radius:999px;border:none;background:var(--line);position:relative;cursor:pointer;flex:none;transition:background .2s var(--ease)}
  .toggle .knob{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s var(--ease)}
  .toggle.on{background:var(--violet)} .toggle.on .knob{left:23px}
  .warmcard{border-color:var(--violet)!important;background:var(--violet-soft)} .warmcard .ic{width:22px;height:22px;color:var(--violet);flex:none}
  .modebanner{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:11px 14px;border-radius:var(--r);background:var(--accent-soft);color:var(--accent-ink);font-size:13.5px;font-weight:600}
  .modebanner.v{background:var(--violet-soft);color:var(--violet)} .modebanner .ic{width:18px;height:18px} .modebanner a,.modebanner .bnlink{margin-left:auto;font-size:13px;font-weight:600;cursor:pointer;text-decoration:underline;color:inherit;border:none;background:none;font-family:inherit;padding:0}
  html.snappy .card,html.snappy .mode,html.snappy .tip,html.snappy .track{animation-duration:.12s!important}
  .mode{display:flex;flex-direction:column;text-align:left;width:100%;border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:17px;gap:7px;box-shadow:var(--shadow);transition:transform .2s var(--ease),border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .mode:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .mode .me{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent-ink)} .mode .me .ic{width:22px;height:22px}
  .mode b{font-size:16px} .mode small{color:var(--muted);font-size:13px}

  label.fld{display:block;font-size:13px;font-weight:600;margin:16px 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:999px;min-height:38px;padding:7px 13px;font-size:13.5px;transition:all .18s var(--ease)}
  .chip:hover{border-color:var(--accent)} .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:11px;min-height:46px;padding:12px 20px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:8px;justify-content:center;box-shadow:0 4px 12px rgba(15,110,106,.25);transition:background .2s var(--ease),transform .12s var(--ease)}
  .btn:hover{background:var(--accent-ink)} .btn:active{transform:scale(.97) translateY(1px)} .btn .ic{width:18px;height:18px}
  .btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none} .btn.ghost:hover{border-color:var(--accent)}
  .btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
  input[type=search],input[type=text],input[type=email],textarea{font-family:inherit;font-size:15px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);width:100%}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  .runtop{display:flex;align-items:center;gap:12px;margin:2px 0 14px;font-size:13px;color:var(--muted)}
  .bar{height:8px;border-radius:6px;background:var(--bg2);overflow:hidden;flex:1}
  .bar>i{display:block;height:100%;width:0;background:var(--accent);border-radius:6px;transition:width .7s var(--ease)}
  .qtext{font-size:19px;font-weight:600;margin:8px 0 16px;font-family:Georgia,serif;line-height:1.45}
  .opt{display:flex;gap:12px;align-items:flex-start;width:100%;text-align:left;border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:12px;padding:14px 15px;margin-bottom:10px;font-size:15px;transition:border-color .15s var(--ease),background .15s var(--ease),transform .12s var(--ease)}
  .opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-soft)} .opt:active:not(:disabled){transform:scale(.99)}
  .opt .k{flex:none;width:27px;height:27px;border-radius:8px;background:var(--bg2);color:var(--muted);display:grid;place-items:center;font-weight:700;font-size:13px}
  .opt.correct{border-color:var(--good);background:var(--good-soft)} .opt.correct .k{background:var(--good);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-soft)} .opt.wrong .k{background:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  .feedback{border-radius:12px;padding:13px 15px;margin:4px 0 12px;font-size:14.5px}
  .feedback.ok{background:var(--good-soft);color:var(--good)} .feedback.no{background:var(--bad-soft);color:var(--bad)}
  .feedback b{font-weight:700} .feedback .sub{display:block;margin-top:3px;color:var(--ink);font-weight:500;opacity:.92}
  .whybtn{border:1px solid var(--line);background:var(--card);color:var(--accent-ink);border-radius:10px;min-height:40px;padding:9px 14px;font-size:13.5px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:border-color .2s var(--ease),background .2s var(--ease)}
  .whybtn:hover{border-color:var(--accent);background:var(--accent-soft)} .whybtn .ic{width:16px;height:16px}
  .whybox{border:1px solid var(--accent);background:var(--accent-soft);border-radius:12px;padding:14px 16px;margin:12px 0 4px;font-size:14px;line-height:1.55}
  .whybox h4{margin:0 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent-ink);font-family:system-ui;display:flex;align-items:center;gap:7px}
  .whybox .ic{width:16px;height:16px}

  .acc{border:1px solid var(--line);border-radius:var(--r);margin-bottom:10px;background:var(--card);overflow:hidden;box-shadow:var(--shadow)}
  .acc>summary{padding:15px 16px;font-weight:700;cursor:pointer;list-style:none;display:flex;align-items:center;gap:11px}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary .n{flex:none;width:28px;height:28px;border-radius:8px;background:var(--accent-soft);color:var(--accent-ink);display:grid;place-items:center;font-size:13px;font-weight:700}
  .acc>summary .caret{margin-left:auto;color:var(--muted);transition:transform .25s var(--ease)} .acc[open]>summary .caret{transform:rotate(90deg)}
  .acc[open]>summary{border-bottom:1px solid var(--line)} .acc .body{padding:6px 18px 16px}
  .acc h4{margin:14px 0 6px;font-size:13px;color:var(--accent-ink);text-transform:uppercase;letter-spacing:.4px;font-family:system-ui}
  .acc ul{margin:0;padding-left:20px} .acc li{margin:6px 0;font-size:14.5px;line-height:1.5}
  .acc.hack li::marker{content:"💡  "} .acc.hack>summary .n{background:var(--violet-soft);color:var(--violet)}
  mark{background:var(--amber-soft);color:inherit;padding:0 2px;border-radius:3px}

  .tip{border:1px solid var(--line);background:var(--card);border-radius:var(--r);padding:15px;box-shadow:var(--shadow)}
  .tip h4{margin:0 0 5px;font-size:14.5px;display:flex;align-items:center;gap:8px;font-family:system-ui} .tip h4 .ic{width:18px;height:18px;color:var(--violet)}
  .tip p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.55}
  .tipgrid{display:grid;gap:12px} @media(min-width:620px){.tipgrid{grid-template-columns:1fr 1fr}}

  .results .big{font-family:Georgia,serif;font-size:54px;text-align:center;margin:8px 0;line-height:1}
  .center{text-align:center} .hide{display:none!important}
  footer{margin-top:34px;text-align:center;color:var(--muted);font-size:13px}
  .kbd{font-size:11px;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;color:var(--muted)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.03)}100%{transform:scale(1)}}
  @keyframes optIn{from{opacity:0;transform:translateX(-9px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: no-preference){
    .card,.mode,.tip{animation:fadeUp .34s var(--ease) both}
    .acc{animation:fadeUp .32s var(--ease) both}
    .opt{animation:optIn .3s var(--ease) backwards;animation-delay:var(--oi,0s)}
    .chip.on{animation:pop .22s var(--ease)}
    .feedback{animation:slideIn .26s var(--ease) both} .whybox{animation:slideIn .28s var(--ease) .07s both} .opt.correct{animation:pop .34s var(--ease)}
  }
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  /* ---- Premium launch (Gemini-stijl) + header-logo gloed ---- */
  @property --bes-a{syntax:'<angle>';initial-value:0deg;inherits:false}
  #splash{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:radial-gradient(125% 125% at 50% 38%,var(--bg2) 0%,var(--bg) 68%);transition:opacity .6s var(--ease),transform .7s var(--ease)}
  #splash.hide{opacity:0;transform:scale(1.07);pointer-events:none}
  .sp-inner{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center}
  .sp-mark{position:relative;width:100px;height:100px;display:grid;place-items:center}
  .sp-mark::before{content:"";position:absolute;inset:-16px;border-radius:34px;z-index:0;background:conic-gradient(from var(--bes-a),var(--accent),var(--violet),var(--amber),var(--accent));filter:blur(17px);opacity:.75}
  .sp-mark::after{content:"";position:absolute;inset:-3px;border-radius:27px;z-index:1;background:conic-gradient(from var(--bes-a),var(--accent),var(--violet),var(--amber),var(--accent));padding:3px;-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
  .sp-logo{position:relative;z-index:2;width:92px;height:92px;border-radius:24px;display:grid;place-items:center;color:#fff;font-family:Georgia,serif;font-weight:700;font-size:46px;background:linear-gradient(150deg,var(--accent),var(--accent-ink));box-shadow:0 14px 38px rgba(15,110,106,.4)}
  .sp-spark{position:absolute;z-index:3;top:-7px;right:-7px;width:30px;height:30px;color:#fff;filter:drop-shadow(0 2px 7px rgba(0,0,0,.35))}
  .sp-name{position:relative;font-family:Georgia,serif;font-size:26px;font-weight:700;letter-spacing:-.01em;color:var(--ink);overflow:hidden}
  .sp-name::after{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 35%,rgba(255,255,255,.75) 50%,transparent 65%);transform:translateX(-130%)}
  .sp-tag{font-size:13px;color:var(--muted);margin-top:-8px;letter-spacing:.03em}
  @media (prefers-reduced-motion: no-preference){
    .sp-mark::before{animation:bes-spin 3s linear infinite,bes-breathe 2.4s var(--ease) infinite}
    .sp-mark::after{animation:bes-spin 3s linear infinite}
    .sp-logo{animation:bes-pop .7s var(--ease) both}
    .sp-spark{animation:bes-pop .6s var(--ease) .12s both,bes-twinkle 1.9s var(--ease) .9s infinite}
    .sp-name{animation:bes-rise .6s var(--ease) .14s both}
    .sp-name::after{animation:bes-shimmer 1.5s var(--ease) .5s 1}
    .sp-tag{animation:bes-rise .6s var(--ease) .26s both}
  }
  @keyframes bes-spin{to{--bes-a:360deg}}
  @keyframes bes-breathe{0%,100%{opacity:.55;filter:blur(16px)}50%{opacity:.95;filter:blur(22px)}}
  @keyframes bes-shimmer{to{transform:translateX(130%)}}
  @keyframes bes-twinkle{0%,100%{opacity:1;transform:scale(1) rotate(0deg)}50%{opacity:.65;transform:scale(.82) rotate(18deg)}}
  @keyframes bes-rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @media(max-width:440px){ header.top .iconbtn span{display:none} header.top .iconbtn{padding:7px 9px;min-width:38px;justify-content:center} .topin{gap:8px} }
</style>
</head>
<body>
<div id="splash"><div class="sp-inner">
  <div class="sp-mark">
    <div class="sp-logo">SP</div>
    <svg class="sp-spark" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 1.5c.4 4.6 2.4 6.6 7 7-4.6.4-6.6 2.4-7 7-.4-4.6-2.4-6.6-7-7 4.6-.4 6.6-2.4 7-7Z"/></svg>
  </div>
  <div><div class="sp-name">Sociale psychologie</div><div class="sp-tag">slim oefenen voor je examen</div></div>
</div></div>
<header class="top">
  <div class="topin">

<script>
window.SOCPSY = {"questions":[{"t":"1","q":"Wat onderzoekt de sociale psychologie volgens de definitie in dit hoofdstuk?","o":["Hoe de aanwezigheid, acties, houdingen en veronderstelde aanwezigheid van anderen onze gedachten, gevoelens, houdingen en gedragingen beïnvloedt","Hoe hersengebieden zich bij elke taak op identieke wijze gedragen","Hoe individuele persoonlijkheidstrekken volledig losstaan van de sociale omgeving","Hoe biologische erfelijkheid alleen het menselijk gedrag bepaalt"],"a":0,"u":"Sociale psychologie is de wetenschappelijke discipline die onderzoekt hoe (veronderstelde) aanwezigheid en acties van anderen onze gedachten, gevoelens, houdingen en gedrag beïnvloeden."},{"t":"1","q":"Wat is het verschil tussen directe en indirecte sociale invloed?","o":["Directe invloed werkt enkel via wetten, indirecte invloed via reclame","Directe invloed is een actieve poging om gedrag/attitudes te veranderen, indirecte invloed werkt subtieler, vaak onbewust","Directe invloed is altijd onbewust, indirecte invloed altijd bewust","Er is geen verschil; beide termen betekenen exact hetzelfde"],"a":1,"u":"Directe sociale invloed (bv. reclame, propaganda, overreding) probeert actief te veranderen; indirecte invloed (bv. aanwezigheid van anderen, culturele normen, wetten) werkt subtiel en vaak zonder dat we het merken."},{"t":"1","q":"Wat wordt in dit hoofdstuk bedoeld met 'constructen'?","o":["Objectieve, fysieke eigenschappen van een situatie","Statistische methoden om data te verzamelen","De subjectieve manier waarop wij de sociale wereld waarnemen, begrijpen en interpreteren","Vaste biologische reflexen die niet beïnvloed worden door cultuur"],"a":2,"u":"Constructen zijn mentale representaties: de subjectieve manier waarop mensen de sociale wereld waarnemen en interpreteren, gevormd door ervaringen, cultuur en cognitieve processen."},{"t":"1","q":"Wat is volgens het hoofdstuk de empirische methode?","o":["Kennis verkrijgen door louter logisch redeneren zonder observatie","Kennis verkrijgen door systematische observatie, ervaring en meting van de werkelijkheid","Kennis baseren op intuïtie en speculatie","Kennis afleiden uit oude filosofische teksten"],"a":1,"u":"De empirische methode verkrijgt kennis via systematische observatie, ervaring en meting van de echte wereld, in plaats van louter te redeneren of speculeren."},{"t":"1","q":"Wat is het verschil tussen de visies van Descartes en Spinoza op waarneming, en wie kreeg volgens modern onderzoek gelijk?","o":["Descartes: we geloven automatisch wat we waarnemen; modern onderzoek bevestigt hem","Spinoza: we oordelen eerst voor we geloven; modern onderzoek bevestigt hem","Descartes: eerst observeren, dan oordelen; Spinoza: we geloven automatisch en corrigeren pas daarna - modern onderzoek geeft Spinoza gelijk","Beiden meenden dat geloven en waarnemen één en hetzelfde proces zijn, wat modern is weerlegd"],"a":2,"u":"Descartes zag een aparte oordeelstap na het waarnemen; Spinoza stelde dat we eerst automatisch geloven en pas daarna bewust corrigeren. Modern onderzoek geeft Spinoza gelijk."},{"t":"1","q":"Wat houdt de fundamentele attributiefout in?","o":["De neiging om de rol van interne factoren te overschatten en externe, situationele factoren te onderschatten bij het verklaren van gedrag","De neiging om alle gedrag uitsluitend aan de situatie toe te schrijven","De neiging om gedrag van anderen nooit te verklaren","De fout om persoonlijkheidstrekken volledig te negeren"],"a":0,"u":"De fundamentele attributiefout is de neiging om iemands gedrag te veel toe te schrijven aan persoonlijkheid/interne factoren en de situationele (externe) factoren te onderschatten."},{"t":"1","q":"Waarin verschilt de gestaltpsychologie van het behaviorisme volgens dit hoofdstuk?","o":["Gestalt richt zich enkel op beloningen en straffen; behaviorisme op interpretatie","Behaviorisme verklaart gedrag via externe bekrachtiging zonder subjectieve processen; gestalt benadrukt juist de subjectieve interpretatie van het geheel","Beide negeren de omgeving volledig","Gestalt ontkent dat de geest actief meedoet bij waarneming"],"a":1,"u":"Het behaviorisme (Skinner) verklaart gedrag via externe beloningen/straffen (S-R) zonder subjectieve processen; de gestaltpsychologie benadrukt de actieve, subjectieve interpretatie en dat het geheel anders is dan de som der delen."},{"t":"1","q":"Welk begrip introduceerde Lee Ross, en wat houdt het in?","o":["Naïef realisme: de neiging te geloven dat ons eigen perspectief de waarheid is","Fenomenologie: hoe de wereld in de geest verschijnt","Self-fulfilling prophecy: verwachtingen die de uitkomst beïnvloeden","Conditionering: leren via stimulus en respons"],"a":0,"u":"Lee Ross introduceerde naïef realisme, de neiging te geloven dat ons eigen perspectief de waarheid weergeeft."},{"t":"1","q":"Wat zijn volgens het hoofdstuk de twee fundamentele menselijke motieven die ten grondslag liggen aan constructies?","o":["Het vermijden van straf en het zoeken naar beloning","Het behouden van een positief zelfbeeld (self-enhancement) en het streven naar nauwkeurigheid (accuracy motive)","Het onderdrukken van emoties en het versterken van logica","Het imiteren van autoriteit en het volgen van wetten"],"a":1,"u":"Mensen hebben de behoefte om een positief zelfbeeld te behouden (self-enhancement) én om accuraat/nauwkeurig te zijn (accuracy motive); de spanning hiertussen verklaart rationalisatie en selectieve informatieverwerking."},{"t":"1","q":"Wat illustreert de 'self-fulfilling prophecy' aan de hand van het klassieke onderwijsvoorbeeld?","o":["Dat leerlingen genetisch bepaald zijn om te slagen of falen","Dat verwachtingen van de leerkracht het gedrag en de resultaten sturen, waardoor leerlingen daadwerkelijk beter scoren","Dat onderwijs geen invloed heeft op prestaties","Dat enkel objectieve toetsen de prestaties bepalen"],"a":1,"u":"Bij de self-fulfilling prophecy beïnvloeden verwachtingen de uitkomst: gelooft een leerkracht in het potentieel van leerlingen, dan scoren die vaak daadwerkelijk hoger omdat de verwachtingen het gedrag en de resultaten sturen."},{"t":"2","q":"Wat is 'hindsight bias' en waarom is dit volgens het hoofdstuk relevant voor de sociale psychologie?","o":["De neiging om achteraf te denken dat een uitkomst voorspelbaar was, wat aantoont waarom empirisch onderzoek nodig is","De neiging van onderzoekers om hun hypothese te bevestigen tijdens een experiment","De fout waarbij deelnemers sociaal wenselijke antwoorden geven op enquêtes","De vertekening die ontstaat doordat een steekproef niet representatief is"],"a":0,"u":"Hindsight bias is de cognitieve vertekening waarbij men achteraf denkt dat een uitkomst voorspelbaar was; het illustreert waarom intuïties getoetst moeten worden via empirisch onderzoek."},{"t":"2","q":"Welke onderzoeksmethode is volgens het hoofdstuk de enige die een oorzaak-gevolgrelatie kan vaststellen?","o":["De observatiemethode","De correlationele methode","De experimentele methode","Archiefanalyse"],"a":2,"u":"Alleen de experimentele methode kan causale relaties vaststellen, doordat de onderzoeker een onafhankelijke variabele systematisch manipuleert en controleert."},{"t":"2","q":"Wat houdt 'interbeoordelaarsbetrouwbaarheid' (interjudge reliability) in?","o":["De mate waarin een onderzoek dezelfde resultaten geeft bij herhaling","De mate van overeenstemming tussen twee of meer onafhankelijke observatoren","De kans dat de resultaten op toeval berusten","De mate waarin resultaten generaliseerbaar zijn naar andere mensen"],"a":1,"u":"Interbeoordelaarsbetrouwbaarheid verwijst naar de mate van overeenstemming tussen onafhankelijke observatoren die hetzelfde gedrag beoordelen, wat de objectiviteit van observaties waarborgt."},{"t":"2","q":"Een correlatiecoëfficiënt van -1 wijst op welk soort verband tussen twee variabelen?","o":["Geen lineair verband","Een perfecte positieve relatie","Een perfecte negatieve relatie","Een causale relatie"],"a":2,"u":"Een waarde van -1 betekent een perfecte negatieve relatie: als de ene variabele stijgt, daalt de andere."},{"t":"2","q":"Wat illustreert het voorbeeld van Rosenberg, waarbij vrouwen die afhankelijk waren van condooms vaker soa's hadden?","o":["Dat condoomgebruik soa's veroorzaakt","Dat een correlatie misleidend kan zijn omdat een derde factor het verband verklaart","Dat de experimentele methode noodzakelijk is voor surveys","Dat een hoge interne validiteit was bereikt"],"a":1,"u":"Het voorbeeld toont dat correlatie geen causaliteit is: een derde factor (vrouwen met andere anticonceptie hebben vaak minder wisselende partners) verklaart het misleidende verband."},{"t":"2","q":"Wat is het verschil tussen de onafhankelijke en de afhankelijke variabele in een experiment?","o":["De onafhankelijke variabele wordt gemeten, de afhankelijke variabele wordt gemanipuleerd","De onafhankelijke variabele wordt gemanipuleerd, de afhankelijke variabele wordt gemeten","Beide worden door de onderzoeker gemanipuleerd","Beide worden enkel gemeten zonder manipulatie"],"a":1,"u":"De onderzoeker manipuleert de onafhankelijke variabele en meet vervolgens het effect op de afhankelijke variabele."},{"t":"2","q":"Wat betekent het wanneer een resultaat een p-waarde kleiner dan 0,05 heeft?","o":["Het resultaat is met zekerheid foutief","De kans dat het resultaat op toeval berust is erg klein, dus het is statistisch significant","Het experiment heeft een hoge externe validiteit","Er is sprake van een storende variabele"],"a":1,"u":"Een p-waarde kleiner dan 0,05 betekent dat de kans op toeval erg klein is, waardoor het resultaat als statistisch significant wordt beschouwd."},{"t":"2","q":"Wat houdt het 'basisdilemma van de sociale psycholoog' in?","o":["De spanning tussen fundamenteel en toegepast onderzoek","De spanning tussen geïnformeerde toestemming en misleiding","De spanning tussen hoge interne validiteit en hoge externe validiteit","De spanning tussen kwalitatief en kwantitatief onderzoek"],"a":2,"u":"Hoge interne validiteit vereist een sterk gecontroleerde omgeving, terwijl hoge externe validiteit een natuurlijke context vraagt; een perfect evenwicht is zelden haalbaar."},{"t":"2","q":"Waarom wordt na een experiment met misleiding een debriefing verplicht gesteld?","o":["Om deelnemers willekeurig aan condities toe te wijzen","Om uit te leggen wat het echte doel was, waarom misleiding nodig was en wat er gebeurd is","Om de p-waarde te berekenen","Om de steekproef representatief te maken"],"a":1,"u":"De debriefing verantwoordt de misleiding: de onderzoeker legt achteraf uit wat het werkelijke doel van het experiment was en waarom misleiding nodig was."},{"t":"2","q":"Wat is het verschil tussen replicatie en een meta-analyse?","o":["Replicatie combineert resultaten van vele studies; een meta-analyse herhaalt één studie","Replicatie herhaalt één studie om consistentie te toetsen; een meta-analyse combineert statistisch de resultaten van meerdere studies","Beide herhalen exact hetzelfde experiment met dezelfde steekproef","Replicatie meet hersenactiviteit; een meta-analyse meet gedrag"],"a":1,"u":"Replicatie test of één specifieke studie bij herhaling dezelfde resultaten oplevert, terwijl een meta-analyse de bevindingen van meerdere studies statistisch samenbrengt voor bredere conclusies."},{"t":"3","q":"Wat is het belangrijkste kenmerk van automatische sociale cognitie?","o":["Ze verloopt bewust, doelgericht en kost veel cognitieve energie","Ze verloopt snel, intuïtief en moeiteloos, zonder dat we er bewust bij stilstaan","Ze wordt alleen gebruikt bij complexe conflicten op het werk","Ze vereist dat we eerst alle alternatieven afwegen"],"a":1,"u":"Automatische sociale cognitie is een snelle, intuïtieve en moeiteloze manier van denken die onbewust verloopt; bewust en inspannend denken hoort bij gecontroleerde cognitie."},{"t":"3","q":"Een script is volgens het hoofdstuk een specifiek type schema. Wat kenmerkt een script?","o":["Het is een mentale representatie van één bepaalde persoon","Het beschrijft de typische volgorde van gebeurtenissen in een bepaalde context","Het activeert een schema enkel via geuren","Het verwijst naar het behoud van overtuigingen na weerlegging"],"a":1,"u":"Een script is een schema dat de typische volgorde van gebeurtenissen in een context beschrijft, zoals het restaurant-script (binnenkomen, bestellen, eten, betalen, vertrekken)."},{"t":"3","q":"Iemand die net woorden over agressie heeft gelezen, interpreteert een neutrale situatie sneller als vijandig. Welk proces illustreert dit?","o":["Het perseveratie-effect","De ankerheuristiek","Priming","Tegenfeitelijk redeneren"],"a":2,"u":"Priming is het tijdelijk activeren van een schema door een prikkel (zoals een woord), waardoor verwante gedachten en interpretaties toegankelijker worden."},{"t":"3","q":"Wat houdt het perseveratie-effect in?","o":["De neiging om overtuigingen te behouden, zelfs nadat het onderliggende bewijs is ontkracht","Het overdreven negatief worden nadat een positieve overtuiging onjuist bleek","Het beter onthouden van onafgemaakte taken","Het aanvullen van ontbrekende informatie met valse herinneringen"],"a":0,"u":"Het perseveratie-effect is de neiging om overtuigingen vast te houden ook nadat het bewijs ervoor is weerlegd, omdat overtuigingen ook op emoties en zelfbeeld berusten."},{"t":"3","q":"Een leerkracht denkt dat een leerling intelligent is, geeft hem meer aandacht en vertrouwen, waardoor de leerling beter gaat presteren. Hoe heet dit fenomeen?","o":["Het Zeigarnikeffect","De self-fulfilling prophecy (Pygmalion-effect)","Het bestraffingseffect","De beschikbaarheidsheuristiek"],"a":1,"u":"Een self-fulfilling prophecy (ook Pygmalion-effect) ontstaat wanneer verwachtingen het gedrag zo beïnvloeden dat de persoon zich gedraagt zoals verwacht, waardoor de verwachting werkelijkheid wordt."},{"t":"3","q":"Wat is het verschil tussen chronisch en tijdelijk toegankelijke schema's?","o":["Chronisch toegankelijke schema's zijn bijna altijd actief, tijdelijk toegankelijke komen op de voorgrond door recente ervaringen of doelen","Chronische schema's worden enkel door geuren geactiveerd, tijdelijke door woorden","Chronische schema's leiden tot valse herinneringen, tijdelijke niet","Er is geen verschil; beide werken volledig bewust"],"a":0,"u":"Chronisch toegankelijke schema's zijn bijna altijd actief door voortdurende ervaringen, terwijl tijdelijk toegankelijke schema's via doelen, recente ervaringen of priming op de voorgrond komen."},{"t":"3","q":"De beschikbaarheidsheuristiek houdt in dat mensen een oordeel vormen op basis van...","o":["Hoe sterk iets lijkt op een typisch voorbeeld van een categorie","Hoe gemakkelijk ze zich iets kunnen herinneren","Een willekeurig beginpunt waarop ze onvoldoende corrigeren","De onderlinge relaties tussen objecten in een scène"],"a":1,"u":"Bij de beschikbaarheidsheuristiek baseert men het oordeel op hoe makkelijk iets uit het geheugen op te roepen is, wat niet altijd representatief is voor de werkelijkheid."},{"t":"3","q":"Bij de representativiteitsheuristiek negeren mensen vaak welke informatie?","o":["De emotionele waarde van de situatie","Basisfrequentie-informatie (hoe vaak iets werkelijk voorkomt)","De toegankelijkheid van het schema","Het anker waarvan ze uitgaan"],"a":1,"u":"De representativiteitsheuristiek beoordeelt op gelijkenis met een typisch voorbeeld, waarbij basisfrequentie-informatie (hoe vaak iets echt voorkomt) vaak wordt genegeerd."},{"t":"3","q":"Volgens Wegner berust gedachteonderdrukking op twee processen. Wat gebeurt er bij het 'ironisch effect'?","o":["De gedachte verdwijnt sneller naarmate men meer moe is","Het monitoringsproces faalt waardoor men de gedachte vergeet","Bij vermoeidheid of stress faalt het operatingsproces, terwijl het monitoringsproces actief blijft, zodat de ongewenste gedachte juist vaker opduikt","Beide processen stoppen, waardoor de gedachte definitief verdwijnt"],"a":2,"u":"Het ironisch effect treedt op wanneer het bewuste operatingsproces faalt (door stress/vermoeidheid) maar het automatische monitoringsproces blijft zoeken, waardoor de onderdrukte gedachte juist hypertoegankelijk wordt."},{"t":"3","q":"Hoe verklaart het hoofdstuk het verschil tussen analytisch (Westers) en holistisch (Oosters) denken?","o":["Door aangeboren biologische verschillen tussen bevolkingen","Door levenslange culturele ervaringen en de typische visuele/sociale omgevingen waarin men opgroeit","Door verschillen in intelligentie tussen culturen","Door het al dan niet aanwezig zijn van scripts"],"a":1,"u":"Het verschil wordt verklaard door levenslange culturele ervaringen en omgevingen: open Westerse scènes stimuleren analytisch denken, gesloten Oosterse scènes bevorderen holistisch denken."},{"t":"4","q":"Wat is volgens het hoofdstuk de kern van wat sociale perceptie inhoudt?","o":["Het proces waarbij we informatie over anderen waarnemen, interpreteren en gebruiken om hun gedrag, emoties en intenties te begrijpen","Het proces waarbij we onze eigen emoties leren reguleren via lichaamstaal","Het aangeboren vermogen om de zes basisemoties enkel te coderen","Het bewust onderdrukken van vooroordelen tijdens een eerste ontmoeting"],"a":0,"u":"Sociale perceptie wordt gedefinieerd als het waarnemen, interpreteren en gebruiken van informatie over anderen om hun gedrag, emoties en intenties te begrijpen."},{"t":"4","q":"Welke rol spelen spiegelneuronen volgens onderzoek van Wicker e.a.?","o":["Ze vormen de biologische basis van empathie door andermans gedrag intern te spiegelen","Ze zorgen ervoor dat we manifestatieregels van onze cultuur leren","Ze onderdrukken automatische interne attributies","Ze bepalen welke gebaren als emblemen worden herkend"],"a":0,"u":"Spiegelneuronen worden actief zowel bij eigen handelen als bij het zien van datzelfde gedrag, en vormen zo de biologische basis van empathie en emotieherkenning."},{"t":"4","q":"Wat toonde het onderzoek van Ekman en Friesen aan over de zes basisemoties?","o":["Ze worden universeel geuit en herkend, ook bij analfabetische stammen en blinde kinderen","Ze worden enkel correct herkend binnen de westerse cultuur","Ze zijn volledig aangeleerd via manifestatieregels","Ze kunnen wel gecodeerd maar niet gedecodeerd worden"],"a":0,"u":"Ekman en Friesen toonden dat blijheid, woede, verdriet, angst, verbazing en walging universeel zijn, ook bij geisoleerde stammen en blinde kinderen; het vermogen is dus aangeboren."},{"t":"4","q":"Iemand verbergt soms een grote glimlach om sociale harmonie te bewaren. Welk begrip uit het hoofdstuk past hier het best bij?","o":["Manifestatieregels","Emblemen","Thin slicing","Perceptuele saillantie"],"a":0,"u":"Manifestatieregels zijn culturele regels die bepalen welk non-verbaal gedrag gepast is in bepaalde situaties, zoals het voorbeeld van Japanse vrouwen die een glimlach verbergen."},{"t":"4","q":"Wat houdt 'thin slicing' (Ambady e.a.) in?","o":["Het vermogen om op basis van minimale informatie snel en accuraat sociale oordelen te vormen","De neiging om succes intern en falen extern toe te schrijven","Het corrigeren van een eerste indruk na meer informatie","Het verbergen van emoties volgens culturele regels"],"a":0,"u":"Thin slicing verwijst naar het trekken van betrouwbare conclusies over persoonlijkheid of competentie op basis van 'dunne sneetjes' gedrag in korte tijd."},{"t":"4","q":"Volgens Heider gedragen mensen zich bij het verklaren van gedrag als...","o":["amateurwetenschappers die informatie verzamelen tot ze een redelijke oorzaak vinden","passieve waarnemers die geen oorzaken zoeken","persoonlijkheidspsychologen die enkel externe oorzaken zoeken","rechters die altijd de situatie de schuld geven"],"a":0,"u":"Heider, de vader van de attributietheorie, stelde dat mensen als amateurwetenschappers gedrag proberen te verklaren door informatie te verzamelen tot een redelijke oorzaak."},{"t":"4","q":"Een werknemer komt te laat. In het covariatiemodel van Kelley wijst hoge consensus erop dat...","o":["het gedrag waarschijnlijk aan de situatie ligt, omdat anderen zich net zo gedragen","het gedrag aan de persoon ligt, omdat enkel hij zo reageert","het gedrag stabiel bij de persoon ligt over de tijd","het gedrag uniek is voor deze ene situatie"],"a":0,"u":"Hoge consensus betekent dat iedereen zich in die situatie zo gedraagt, wat wijst op een situationele (externe) oorzaak."},{"t":"4","q":"Wat houdt de fundamentele attributiefout (Ross) precies in?","o":["De neiging om bij anderen interne oorzaken te overschatten en situationele factoren te onderschatten","De neiging om eigen succes intern en eigen falen extern toe te schrijven","De neiging te denken dat anderen vatbaarder zijn voor denkfouten dan wijzelf","De neiging slachtoffers verantwoordelijk te houden voor hun pech"],"a":0,"u":"De fundamentele attributiefout is het overschatten van dispositionele (interne) factoren en het onderschatten van situationele (externe) factoren bij het verklaren van andermans gedrag."},{"t":"4","q":"Hoe verloopt het tweeledige proces van attributies maken volgens het hoofdstuk?","o":["Eerst een automatische interne attributie, daarna een bewuste correctie voor de situatie","Eerst een externe attributie, daarna een automatische interne aanvulling","Eerst consensus bepalen, daarna distinctiviteit","Eerst decoderen, daarna coderen van de emotie"],"a":0,"u":"Men schrijft gedrag eerst spontaan toe aan de persoon (automatische interne attributie) en houdt pas in een tweede, bewuste fase rekening met situationele factoren."},{"t":"4","q":"Wat is het verschil tussen zelfdienende attributie en defensieve attributie?","o":["Zelfdienende attributie beschermt zelfbeeld en eigenwaarde; defensieve attributie is een ruimer mechanisme dat gevoelens van kwetsbaarheid en sterfelijkheid vermindert","Zelfdienende attributie schrijft succes extern toe; defensieve attributie schrijft falen intern toe","Zelfdienende attributie komt enkel in collectivistische culturen voor; defensieve enkel in westerse","Zelfdienende attributie betreft anderen; defensieve attributie betreft uitsluitend jezelf"],"a":0,"u":"Zelfdienende attributie beschermt het zelfbeeld door succes intern en falen extern toe te schrijven; defensieve attributie is een ruimer mechanisme dat angst en gevoelens van kwetsbaarheid/sterfelijkheid helpt vermijden (Walster)."},{"t":"5","q":"William James maakte een fundamentele tweedeling in het zelf. Waarnaar verwijst het 'I'?","o":["Het objectieve, gereflecteerde zelf met kennis en evaluaties over zichzelf","Het subjectieve, reflecterende aspect: het proces waarbij men de aandacht op het zelf richt","Het ideale zelf: wie men zou willen zijn","Het normatieve zelf: wie men denkt te moeten zijn"],"a":1,"u":"Volgens James verwijst het 'I' naar het subjectieve, ervarende/reflecterende zelf (zelfbewustzijn), terwijl het 'Me' het objectieve, gereflecteerde zelf (zelfconcept) is."},{"t":"5","q":"In het spiegeltest-onderzoek van Gallup wijst het systematisch aanraken van de gemarkeerde plek op:","o":["Een volledig ontwikkeld ideaal zelf","De aanwezigheid van een rudimentair zelfconcept","Een vorm van impressiemanagement","Een fysiologische arousalreactie"],"a":1,"u":"Het aanraken van de vlek bij het zien van het spiegelbeeld duidt op zelfherkenning, oftewel een rudimentair zelfconcept: het besef dat het spiegelbeeld naar het eigen lichaam verwijst."},{"t":"5","q":"Volgens de zelfbewustzijnstheorie van Duval & Wicklund gebeurt er iets wanneer mensen hun aandacht op zichzelf richten. Wat?","o":["Ze vergelijken hun gedrag met hun innerlijke normen en waarden","Ze leiden hun emoties af uit hun fysiologische opwinding","Ze vergelijken zichzelf automatisch met betere anderen","Ze verhogen hun intrinsieke motivatie"],"a":0,"u":"Bij zelfgerichte aandacht evalueren mensen hun gedrag en vergelijken dit met hun interne normen en waarden; bij een discrepantie passen ze hun gedrag aan of ontsnappen ze aan het zelfbewustzijn."},{"t":"5","q":"Wat toonden Nisbett & Wilson aan over introspectie?","o":["Mensen hebben perfecte toegang tot hun mentale processen","Mensen hebben alleen toegang tot het eindresultaat, niet tot het cognitieve proces erachter","Introspectie is de meest betrouwbare bron van stabiele attitudes","Introspectie leidt altijd tot blijvende attitudeverandering"],"a":1,"u":"Volgens Nisbett & Wilson hebben mensen alleen toegang tot hoe ze zich voelen (het eindresultaat), niet tot het onderliggende cognitieve proces; ze verzinnen daardoor vaak onjuiste causale redenen."},{"t":"5","q":"De zelfperceptietheorie van Bem stelt dat mensen vooral hun attitudes en emoties uit hun gedrag afleiden wanneer:","o":["Hun interne signalen sterk en duidelijk zijn","Hun oorspronkelijke gevoelens zwak of onduidelijk zijn","Ze worden vergeleken met betere anderen","Ze onder narcose zijn gebracht"],"a":1,"u":"Volgens Bem kijken mensen naar hun eigen gedrag en de context om hun gevoelens af te leiden, vooral wanneer interne signalen vaag of zwak zijn."},{"t":"5","q":"Wat houdt het overrechtvaardigingseffect (overjustification effect) in?","o":["Een extern beloonde, van nature leuke activiteit wordt toegeschreven aan de beloning, waardoor intrinsieke motivatie afneemt","Beloning verhoogt altijd de intrinsieke motivatie voor een taak","Mensen onderschatten de invloed van externe beloningen op hun gedrag","Mensen leiden hun emoties af uit hun fysiologische opwinding"],"a":0,"u":"Wanneer een intrinsiek leuke activiteit plotseling extern beloond wordt, schrijft men het gedrag toe aan de beloning (extrinsiek) in plaats van plezier (intrinsiek), waardoor de intrinsieke motivatie kan afnemen."},{"t":"5","q":"Iemand met een growth mindset (variabele kijk op zichzelf) zal bij een moeilijke taak of tegenslag waarschijnlijk:","o":["Sneller opgeven omdat falen bewijst dat capaciteiten beperkt zijn","Gemotiveerd blijven en harder proberen, omdat falen een leerkans is","Zijn capaciteiten als vaststaand en onveranderlijk beschouwen","De taak vermijden om zijn aangeboren talent niet te bedreigen"],"a":1,"u":"Bij een growth mindset worden capaciteiten gezien als kneedbaar; tegenslag is een kans om te leren, dus blijft men gemotiveerd en zet harder door."},{"t":"5","q":"Volgens de tweefactorentheorie van Schachter ontstaat een emotie door:","o":["Uitsluitend fysiologische opwinding","Uitsluitend een cognitief oordeel zonder enige opwinding","Fysiologische arousal gecombineerd met cognitieve interpretatie (labeling) van die opwinding","Sociale vergelijking met vergelijkbare anderen"],"a":2,"u":"De tweefactorentheorie stelt dat een emotie bestaat uit fysiologische arousal plus een cognitieve labeling: de context bepaalt welke emotie aan de opwinding wordt toegeschreven."},{"t":"5","q":"In het klassieke brug-experiment belden mannen op de wiebelige brug vaker de aantrekkelijke onderzoekster. Dit illustreert:","o":["Het overrechtvaardigingseffect","Misattributie van arousal","Neerwaartse sociale vergelijking","Gedragsmatige zelfsabotage"],"a":1,"u":"De mannen schreven hun door de spannende brug veroorzaakte opwinding ten onrechte toe aan aantrekkingskracht: een misattributie van arousal."},{"t":"5","q":"Wat is volgens de tekst het verschil tussen gedragsmatige en gerapporteerde zelfsabotage?","o":["Gedragsmatige zelfsabotage zijn alleen excuses; gerapporteerde is echt belemmerend gedrag","Gedragsmatige zelfsabotage is echt belemmerend gedrag; gerapporteerde zijn enkel excuses of verklaringen","Beide verwijzen naar het geven van complimenten aan anderen","Beide zijn vormen van sociale vergelijking"],"a":1,"u":"Bij gedragsmatige zelfsabotage onderneemt men daadwerkelijk acties die succes belemmeren (bv. te weinig studeren), terwijl gerapporteerde zelfsabotage enkel excuses of verklaringen omvat zonder echt belemmerend gedrag."},{"t":"6","q":"Wat is volgens Festinger cognitieve dissonantie?","o":["Het onaangename gevoel van spanning veroorzaakt door twee of meer onverenigbare cognities","De neiging om informatie te zoeken die je zelfbeeld bevestigt","Het overschatten van hoe slecht je je in de toekomst zult voelen","Een verkooptechniek waarbij men eerst een lage prijs noemt"],"a":0,"u":"Cognitieve dissonantie is het onaangename spanningsgevoel dat ontstaat door onverenigbare cognities, vaak doordat gedrag botst met het positieve zelfbeeld."},{"t":"6","q":"Wanneer treedt cognitieve dissonantie volgens het hoofdstuk het sterkst op?","o":["Wanneer mensen een beloning krijgen voor hun gedrag","Wanneer mensen zich gedragen op een manier die hun zelfbeeld bedreigt","Wanneer mensen een omkeerbare beslissing nemen","Wanneer mensen een negatief zelfbeeld hebben"],"a":1,"u":"Dissonantie is het sterkst wanneer gedrag het zelfbeeld bedreigt, omdat het mensen dwingt het verschil tussen wie ze denken te zijn en hun werkelijke gedrag onder ogen te zien."},{"t":"6","q":"Welke van de volgende is GEEN van de drie fundamentele manieren om cognitieve dissonantie te reduceren?","o":["Het gedrag aanpassen zodat het weer overeenstemt met de overtuigingen","Overtuigingen veranderen om het gedrag te rechtvaardigen","Nieuwe overtuigingen ontwikkelen die het gedrag legitimeren","Het slachtoffer aardiger gaan vinden na het schaden ervan"],"a":3,"u":"De drie manieren zijn gedrag aanpassen, overtuigingen veranderen en nieuwe legitimerende overtuigingen ontwikkelen; slachtoffers worden juist gedenigreerd, niet aardiger gevonden."},{"t":"6","q":"Wat houdt de impact bias in?","o":["Mensen onderschatten hoe goed een beslissing zal uitpakken","Mensen overschatten hoe slecht en hoe lang ze zich zullen voelen bij negatieve gebeurtenissen","Mensen overschatten de aantrekkelijkheid van een afgewezen alternatief","Mensen schatten de winstkans lager in nadat ze hebben ingezet"],"a":1,"u":"Door de impact bias overschatten mensen hoe slecht en hoe lang ze zich zullen voelen, omdat ze niet beseffen dat ze dissonantie kunnen reduceren."},{"t":"6","q":"Wat is postdecision dissonance?","o":["De spanning die ontstaat voordat men een beslissing neemt en informatie verzamelt","De spanning na een belangrijke keuze, waardoor men de gekozen optie opwaardeert en de afgewezen optie afwaardeert","De spanning die ontstaat door een standpunt te verdedigen dat ingaat tegen je overtuiging","De spanning bij mensen met een laag zelfbeeld na immoreel gedrag"],"a":1,"u":"Postdecision dissonance is de spanning na een belangrijke keuze; men vergroot de positieve kanten van het gekozen alternatief en verkleint die van het niet-gekozen alternatief."},{"t":"6","q":"Wat toonde de paardenrennen-studie van Knox & Inkster aan?","o":["Mensen die net hadden ingezet schatten hun winstkans hoger in dan mensen die nog moesten inzetten","Mensen die nog moesten inzetten waren zekerder van winst","Onomkeerbare keuzes leidden tot minder tevredenheid","De hoogte van de inzet bepaalde de attitudeverandering"],"a":0,"u":"Zodra de inzet (een onomkeerbare beslissing) gedaan was, verhoogden mensen automatisch hun ingeschatte winstkans om dissonantie te reduceren."},{"t":"6","q":"Op welke illusie steunt de verkooptechniek lowballing?","o":["De illusie van een betere kwaliteit","De illusie van onherroepelijkheid van de beslissing","De illusie van zelfverheffing","De illusie van externe rechtvaardiging"],"a":1,"u":"Lowballing gebruikt de illusie van onherroepelijkheid: mensen voelen zich al psychologisch verbonden en gaan akkoord met de verhoogde prijs om dissonantie te vermijden."},{"t":"6","q":"Wat is rechtvaardiging van inspanning (effort justification)?","o":["Men past het zelfbeeld aan en ziet zichzelf als dwaas na veel inspanning","Men waardeert een doel achteraf positiever wanneer men er vrijwillig veel inspanning voor leverde","Men verwijst naar een externe beloning om gedrag te verklaren","Men zoekt feedback die het bestaande zelfbeeld bevestigt"],"a":1,"u":"Bij effort justification waardeert men een doel positiever na vrijwillige inspanning, om niet als onkundig over te komen en zo een consistent positief zelfbeeld te behouden."},{"t":"6","q":"In het experiment van Festinger & Carlsmith (1959) vond welke groep het saaie experiment achteraf leuker, en waarom?","o":["De groep met $20, omdat zij een sterke externe rechtvaardiging had","De groep met $1, omdat zij weinig externe rechtvaardiging had en intern haar houding aanpaste","Beide groepen even sterk, omdat de leugen dezelfde was","De groep met $20, omdat het geld hun zelfbeeld verhoogde"],"a":1,"u":"De $1-groep had geen sterke externe reden om te liegen, ervoer dissonantie en paste haar houding intern aan; de $20-groep had een duidelijke externe rechtvaardiging."},{"t":"6","q":"Waarom ervaren mensen met een negatief zelfbeeld vaak weinig dissonantie na immoreel gedrag (zoals in het onderzoek van Glas, 1964)?","o":["Omdat zij geen zelfbeeld hebben om te beschermen","Omdat het immorele gedrag consistent is met hun negatieve zelfbeeld, waardoor er geen behoefte is aan denigratie","Omdat zij hun slachtoffer altijd denigreren om de spanning weg te nemen","Omdat zij steevast gebruikmaken van externe rechtvaardiging"],"a":1,"u":"Bij een negatief zelfbeeld komt immoreel gedrag overeen met hoe men zichzelf ziet, dus is er weinig spanning en geen behoefte om het slachtoffer te denigreren."},{"t":"7","q":"Wat wordt in dit hoofdstuk verstaan onder een attitude?","o":["Een onbewuste reactie die enkel via de IAT gemeten kan worden","Een evaluatie van een attitudeobject, zoals een persoon, voorwerp of idee","Een vaste persoonlijkheidstrek die niet kan veranderen","Een neutrale waarneming zonder positief of negatief oordeel"],"a":1,"u":"Een attitude wordt gedefinieerd als een evaluatie van een attitudeobject (persoon, voorwerp of idee); mensen zijn zelden neutrale waarnemers."},{"t":"7","q":"Iemand beslist of hij een nieuwe smartphone koopt of bij zijn huidige blijft. Bij welke component van een attitude hoort dit?","o":["De affectieve component","De cognitieve component","De gedragsmatige component","De normatieve component"],"a":2,"u":"De gedragsmatige component betreft de neiging tot of het daadwerkelijke gedrag tegenover het attitudeobject, zoals beslissen om te kopen."},{"t":"7","q":"Welke uitspraak past het best bij een affectief gebaseerde attitude?","o":["Ze is rationeel en ontstaat door objectieve evaluatie van feiten","Ze heeft een waarde-expressieve functie en toont wie we zijn","Ze ontstaat altijd door het observeren van het eigen gedrag","Ze dient vooral om voor- en nadelen praktisch af te wegen"],"a":1,"u":"Affectief gebaseerde attitudes zijn gebaseerd op emoties en waarden en hebben een waarde-expressieve functie: ze laten zien wie we zijn."},{"t":"7","q":"De Zelfperceptietheorie van Daryl Bem hoort bij welk soort attitude?","o":["Cognitief gebaseerde attitudes","Affectief gebaseerde attitudes","Gedragsmatig gebaseerde attitudes","Impliciete attitudes"],"a":2,"u":"Volgens Bems zelfperceptietheorie leiden mensen hun houding af uit hun eigen gedrag; dit kenmerkt gedragsmatig gebaseerde attitudes."},{"t":"7","q":"Wat is een kenmerk van impliciete attitudes vergeleken met expliciete attitudes?","o":["Ze worden bewust geformuleerd en gemakkelijk gerapporteerd","Ze zijn vooral beïnvloed door recente ervaringen","Ze zijn onwillekeurig, vaak onbewust en moeilijk te controleren","Ze worden gemeten door directe vragen te stellen"],"a":2,"u":"Impliciete attitudes zijn onwillekeurig, vaak onbewust en moeilijk te controleren, en zijn vaak geworteld in jeugdervaringen; ze worden gemeten via de IAT."},{"t":"7","q":"Wat toonde het onderzoek van LaPiere over de relatie tussen attitude en gedrag aan?","o":["Attitudes voorspellen gedrag altijd nauwkeurig","Attitudes hebben geen enkele invloed op gedrag","Mensen bedienden Chinezen in de praktijk hoewel ze er negatief tegenover stonden","Mensen weigerden Chinezen te bedienen terwijl ze er positief tegenover stonden"],"a":2,"u":"LaPiere toonde dat mensen Chinezen in de praktijk wel bedienden hoewel ze er negatief tegenover stonden; attitudes voorspellen dus niet altijd gedrag."},{"t":"7","q":"Volgens de theorie van gepland gedrag wordt de intentie tot gedrag NIET bepaald door:","o":["Attitudes ten opzichte van het specifieke gedrag","Subjectieve normen over hoe anderen het gedrag zien","De inschatting van controle over het gedrag","De toegankelijkheid van de attitude door directe ervaring"],"a":3,"u":"Gepland gedrag wordt bepaald door attitudes ten opzichte van het gedrag, subjectieve normen en waargenomen controle; attitudetoegankelijkheid hoort bij het voorspellen van spontaan gedrag."},{"t":"7","q":"Wanneer kan volgens de cognitieve dissonantietheorie een attitude veranderen?","o":["Wanneer gedrag overeenkomt met de bestaande attitude","Wanneer gedrag afwijkt van de attitude en er geen externe rechtvaardiging is","Wanneer er een sterke externe beloning voor het gedrag bestaat","Wanneer de boodschap via de perifere route wordt verwerkt"],"a":1,"u":"Dissonantie ontstaat als gedrag niet overeenkomt met de attitude en externe rechtvaardiging ontbreekt; mensen passen dan hun attitude aan om interne rechtvaardiging te creëren en dissonantie te verminderen."},{"t":"7","q":"Wat leidt volgens het Elaboration Likelihood Model tot duurzame attitudeverandering?","o":["De centrale route, met grondige verwerking van de argumenten","De perifere route, via aantrekkelijkheid van de spreker","Het gebruik van heuristieken zoals 'experten hebben altijd gelijk'","Een positief humeur dat aandacht voor de boodschap vermindert"],"a":0,"u":"De centrale route, waarbij mensen de inhoudelijke kwaliteit en logica grondig verwerken, leidt tot duurzame attitudeverandering; de perifere route slechts tot kortdurende of oppervlakkige verandering."},{"t":"7","q":"Onder welke voorwaarde is angstopwekkende communicatie het meest effectief?","o":["Wanneer de angst zo hoog mogelijk wordt opgewekt","Wanneer de angst matig is en mensen geloven dat de boodschap hen kan helpen de angst te reduceren","Wanneer geen concrete instructies worden gegeven, zodat mensen zelf nadenken","Wanneer de boodschap zich richt op mensen met een positief humeur"],"a":1,"u":"Angstopwekkende communicatie werkt het best bij matige angst, geloof dat de boodschap helpt de angst te reduceren, en duidelijke coping-instructies; te hoge angst leidt tot verdediging en ontkenning."}],"theory":[{"h":"H1 — Introductie sociale psychologie","items":["Sociale psychologie: wetenschappelijke studie van hoe de (veronderstelde) aanwezigheid, acties en houdingen van anderen ons denken, voelen en gedrag beïnvloeden.","Sociale invloed (direct vs. indirect) en constructen = subjectieve mentale representaties waarmee we de sociale wereld interpreteren.","Empirische methode: kennis via systematische observatie en meting; Spinoza vs. Descartes (we geloven eerst automatisch, corrigeren pas daarna).","Fundamentele attributiefout: overschatten van interne/persoonlijke oorzaken, onderschatten van situationele factoren (kracht van de situatie).","Twee kernmotieven: positief zelfbeeld (self-enhancement / eigenwaarde) en behoefte aan nauwkeurigheid (sociale cognitie); self-fulfilling prophecy.","Klassieke studies: bystander-effect (Genovese, Latané & Darley), gehoorzaamheid (Milgram), Stanford prison experiment (Zimbardo)."]},{"h":"H2 — Methodologie","items":["Empirisch onderzoek toetst intuïties/volkswijsheden; hindsight bias toont waarom dit nodig is.","Observatiemethode (beschrijven): etnografie, participerende observatie, archiefanalyse, interbeoordelaarsbetrouwbaarheid.","Correlationele methode (voorspellen): correlatiecoëfficiënt (-1 tot +1), surveys/random steekproef; correlatie ≠ causaliteit (derde variabele).","Experimentele methode (oorzaak-gevolg): onafhankelijke vs. afhankelijke variabele, randomisatie, p-waarde < 0,05 = significant.","Interne validiteit (controle, geen confounders) vs. externe validiteit (generaliseerbaarheid); psychologisch realisme, veldexperiment, replicatie & meta-analyse.","Ethiek: informed consent, misleiding + debriefing, fraude (Stapel); cultuur, evolutie en sociale neurowetenschap (EEG, fMRI) als nieuwe richtingen."]},{"h":"H3 — Sociale cognitie","items":["Automatisch denken (snel, onbewust) vs. gecontroleerd denken (bewust, inspannend, doelgericht).","Schema's = mentale structuren die waarneming/herinnering sturen; scripts, priming, toegankelijkheid (chronisch vs. tijdelijk).","Perseveratie-effect, self-fulfilling prophecy (Pygmalion-effect), embodied brain (lichaam beïnvloedt sociale oordelen).","Beoordelingsheuristieken: beschikbaarheid, representativiteit (negeert basisfrequentie), anker-en-correctie.","Cultuur: analytisch (Westers) vs. holistisch (Oosters) denken.","Gecontroleerd denken: tegenfeitelijk redeneren (counterfactual), gedachteonderdrukking (ironisch effect, Wegner), Zeigarnik-effect."]},{"h":"H4 — Sociale perceptie","items":["Sociale perceptie: waarnemen en interpreteren van gedrag, emoties en intenties van anderen.","Non-verbale communicatie; spiegelneuronen als biologische basis van empathie; zes universele basisemoties (Ekman): coderen/decoderen.","Manifestatieregels, emblemen en culturele verschillen in non-verbaal gedrag.","Eerste indrukken (binnen 100 ms), impliciete persoonlijkheidstheorieën, thin slicing.","Causale attributie: intern vs. extern; covariatiemodel van Kelley (consensus, distinctiviteit, consistentie).","Attributiefouten: fundamentele attributiefout (perceptuele saillantie), zelfdienende attributie, defensieve attributie, bias blind spot."]},{"h":"H5 — Zelfinzicht","items":["Zelfconcept (Me) vs. zelfbewustzijn (I, James); spiegeltest (Gallup); vier componenten: zelfkennis, zelfcontrole, impressiemanagement, zelfvertrouwen.","Zelfkennis via introspectie (zelfbewustzijnstheorie, Duval & Wicklund; beperkte toegang, Nisbett & Wilson).","Zelfperceptietheorie (Bem): we leiden attitudes af uit gedrag; intrinsieke vs. extrinsieke motivatie en het overrechtvaardigingseffect.","Fixed vs. growth mindset; emoties: tweefactorentheorie (Schachter), misattributie van arousal (brug-experiment).","Sociale vergelijkingstheorie (Festinger): opwaartse vs. neerwaartse vergelijking; zelfcontrole en ego-depletie (energiemodel).","Impressiemanagement (zelfpresentatie, vleien, zelfsabotage); zelfvertrouwen, self-efficacy, angstmanagementtheorie, narcisme."]},{"h":"H6 — Behoefte om ons handelen te rechtvaardigen","items":["Cognitieve dissonantie (Festinger): onaangename spanning bij onverenigbare cognities; reductie via gedrag/overtuiging veranderen of zelfbevestiging.","Beslissingen: postdecision dissonance, onomkeerbaarheid verhoogt waardering (Knox & Inkster), lowballing, impact bias.","Rechtvaardiging van inspanning (effort justification) en counter-attitudinal advocacy.","Externe vs. interne rechtvaardiging: Festinger & Carlsmith ($1 vs. $20) — minder externe reden = sterkere attitudeverandering.","Onvoldoende straf → zelfoverreding (duurzame attitudeverandering); hypocrisieparadigma; slachtoffers denigreren/ontmenselijken.","Negatief zelfbeeld geeft minder dissonantie bij immoreel gedrag; zelfverificatietheorie (stabiel zelfbeeld weegt zwaarder dan zelfverheffing)."]},{"h":"H7 — Attitudes en attitudeverandering","items":["Attitude = evaluatie van een attitudeobject; componenten: affectief, cognitief, gedragsmatig; cognitief/affectief/gedragsmatig gebaseerde attitudes.","Expliciete vs. impliciete attitudes (IAT); attitudes voorspellen gedrag bij hoge toegankelijkheid; theorie van gepland gedrag (attitude, subjectieve norm, gedragscontrole).","Persuasieve communicatie: Yale-aanpak (wie zegt wat tegen wie); primacy- vs. recentheidseffect.","Centrale route (sterke argumenten, duurzaam) vs. perifere route (heuristieken/oppervlakkig, kortdurend); ELM, behoefte aan cognitie.","Emotie: angstopwekkende communicatie (matige angst + coping-instructies), emotie als heuristiek; rationele argumenten voor cognitieve, emotionele voor affectieve attitudes.","Reclame en subliminale boodschappen (Vicary-mythe), genderstereotypen; weerstand: attitude-inenting, reactantietheorie, boemerangeffect."]}],"hacks":[{"h":"Situatie verslaat persoon","t":"Onthoud de fundamentele attributiefout: we verklaren gedrag te veel vanuit persoonlijkheid en onderschatten de macht van de situatie. Bij twijfel: kijk naar de situatie."},{"h":"Twee motieven verklaren bijna alles","t":"Veel fenomenen draaien om 2 behoeften: je goed voelen (zelfwaardering) én accuraat zijn (sociale cognitie). Koppel elk verschijnsel aan één van die twee."},{"h":"Ken de klassieke experimenten","t":"Milgram = gehoorzaamheid aan autoriteit · Kitty Genovese/bystander = diffusie van verantwoordelijkheid · Festinger = cognitieve dissonantie. Ken telkens de LES, niet enkel het verhaal."},{"h":"Centrale vs perifere route","t":"Overtuiging: centrale route = inhoud & argumenten (duurzaam, bij motivatie+vermogen) · perifere route = oppervlakkige kenmerken/heuristieken (kort). 'Hoe afgeleider, hoe perifeerer'."},{"h":"Correlatie ≠ causaliteit","t":"Observatie = beschrijven · correlatie = voorspellen (geen oorzaak!) · experiment = oorzaak-gevolg aantonen. Alleen het experiment toont oorzakelijkheid."},{"h":"Mensen reageren op hun constructie","t":"Niet de situatie zelf, maar de INTERPRETATIE ervan stuurt gedrag. 'Telling more than we can know': we kennen onze eigen processen niet altijd."}]};
</script>

      var juist=cur.opts.filter(function(o){return o.ok;})[0].text;
      fb.innerHTML=ok?"<b>"+rnd(PRAISE)+" ✓</b>":"<b>"+wrongLead()+"</b><span class=\"sub\">Juiste antwoord: "+esc(juist)+"</span>";
      var w=document.createElement("div"); w.innerHTML='<div class="whybox"><h4>'+ic("sparkles")+'Waarom?</h4>'+esc(q.u)+'</div>'; fb.appendChild(w);
      nb.classList.remove("hide"); nb.innerHTML=(Q.idx+1>=Q.items.length)?"Bekijk resultaat "+ic("arrowR"):"Volgende "+ic("arrowR");
    }
    function pick(i){ if(Q.answered)return; Q.answered=true; Q.picked=i; if(cur.opts[i].ok)Q.correct++; else Q.wrong.push(q); showAnswered(i); nb.focus(); }
    optBtns.forEach(function(b){ b.onclick=function(){ pick(+b.dataset.i); }; });
    function next(){ if(!Q.answered)return; Q.idx++; Q.answered=false; Q.picked=-1; if(Q.idx>=Q.items.length)Q.done=true; renderQuiz(); }
    if(Q.answered) showAnswered(Q.picked);
    state.key=function(e){ if(!Q.answered){ var k=e.key.toLowerCase(); var idx="abcde".indexOf(k); if(idx<0&&/[1-5]/.test(k))idx=+k-1; if(idx>=0&&idx<cur.opts.length){pick(idx);e.preventDefault();} } else if(e.key==="Enter"||e.key===" "){ next(); e.preventDefault(); } };
  }

  function renderResult(){
    var Q=state.quiz, p=pct(Q.correct,Q.items.length);
    var msg=p>=80?"Sterk werk! 🎉":p>=60?"Goed bezig 👍":"Blijf oefenen — je komt er 💪";
    var html='<div class="card pad results center"><span class="pill">Sociale psychologie</span><div class="big">'+p+'%</div>'+
      '<p style="font-weight:600;margin:0 0 4px;font-size:17px">'+msg+'</p><p class="muted">'+Q.correct+' van '+Q.items.length+' juist</p>'+
      '<div class="row" style="justify-content:center;margin-top:14px">'+
        (Q.wrong.length?'<button class="btn" id="retry">Herhaal '+Q.wrong.length+' foute vragen</button>':'')+
        '<button class="btn ghost" id="again">Nieuwe ronde</button><button class="btn ghost" id="home">Naar start</button></div></div>';
    setHTML(html);
    var rt=document.getElementById("retry"); if(rt) rt.onclick=function(){ startQuiz(shuffle(Q.wrong)); };
    document.getElementById("again").onclick=function(){ state.quiz=null; renderQuizGate(); };
    document.getElementById("home").onclick=function(){ state.quiz=null; go("home"); };
    state.key=null;
  }

  function renderTheory(){
    var q=state.sumq||"";
    var html='<div class="card pad" style="margin-bottom:14px"><h2 style="margin:0 0 8px">Theorie — samenvatting</h2>'+
      '<input type="search" id="sq" placeholder="Zoek een begrip… (bv. p-waarde, regressie, binomiaal)" value="'+esc(q)+'"></div><div id="list">'+theoryList(q)+'</div>';
    setHTML(html);
    var si=document.getElementById("sq"); si.oninput=function(){ state.sumq=si.value; document.getElementById("list").innerHTML=theoryList(si.value); si.focus(); };
  }
  function theoryList(query){
    var Q=query.trim().toLowerCase(), out="", n=0;
    D.theory.forEach(function(sec){
      var items=sec.items.filter(function(it){ return !Q || it.toLowerCase().indexOf(Q)>=0 || sec.h.toLowerCase().indexOf(Q)>=0; });
      if(!items.length) return; n++;
      out+='<details class="acc"'+(Q?" open":(n===1?" open":""))+'><summary><span class="n">'+ic("search")+'</span>'+esc(sec.h)+ic("chevR","caret")+'</summary><div class="body"><ul>'+items.map(function(it){return '<li>'+hl(esc(it),Q)+'</li>';}).join("")+'</ul></div></details>';
    });
    return out||'<p class="muted center">Geen resultaten voor "'+esc(query)+'".</p>';
  }
  function hl(t,q){ if(!q)return t; try{ return t.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","ig"),"<mark>$1</mark>"); }catch(e){ return t; } }

  function renderHacks(){
    var html='<div class="card pad" style="margin-bottom:16px"><h2 style="margin:0 0 6px">Studie-hacks</h2><p class="muted" style="margin:0">Ezelsbruggetjes om de kernideeën van statistiek te onthouden.</p></div>'+
      '<div class="tipgrid">'+D.hacks.map(function(t){return '<div class="tip"><h4>'+ic("bulb")+esc(t.h)+'</h4><p>'+esc(t.t)+'</p></div>';}).join("")+'</div>';
    setHTML(html);
  }

  function renderFeedback(){
    var html='<div class="card pad"><h2 style="margin-top:0">Feedback &amp; klachten</h2>'+
      '<p class="muted">Fout in een vraag, een idee, of werkt iets niet? Laat het hier weten — het komt rechtstreeks bij de maker terecht.</p>'+
      '<label class="fld" for="fbMsg">Je bericht</label><textarea id="fbMsg" rows="5" placeholder="Beschrijf de fout of je idee…"></textarea>'+
      '<label class="fld" for="fbWaar">Over welke vraag? <span class="muted">(optioneel)</span></label><input type="text" id="fbWaar" placeholder="bv. de vraag over de p-waarde">'+
      '<label class="fld" for="fbNaam">Je naam <span class="muted">(optioneel)</span></label><input type="text" id="fbNaam" placeholder="zodat we je kunnen bedanken">'+
      '<label class="fld" for="fbEmail">Je e-mail <span class="muted">(optioneel — als je een antwoord wilt)</span></label><input type="email" id="fbEmail" placeholder="naam@voorbeeld.be">'+
      '<input type="text" id="fbBot" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px;opacity:0">'+
      '<div class="row" style="margin-top:16px;align-items:center"><button class="btn" id="fbSend">'+ic("send")+'Versturen</button><span id="fbStatus" style="font-size:13px"></span></div></div>';
    setHTML(html);
    document.getElementById("fbSend").onclick=function(){
      var status=document.getElementById("fbStatus");
      if(document.getElementById("fbBot").value) return;
      var msg=document.getElementById("fbMsg").value.trim();
      if(!msg){ status.style.color="var(--bad)"; status.textContent="Schrijf eerst een bericht."; return; }
      var btn=document.getElementById("fbSend"); btn.disabled=true; status.style.color="var(--muted)"; status.textContent="Versturen…";
      var em=document.getElementById("fbEmail").value.trim();
      var nm=document.getElementById("fbNaam").value.trim();
      var waar=document.getElementById("fbWaar").value.trim();
      var payload={_subject:"Statistiek-tool: feedback", _template:"table", _captcha:"false",
        Naam:nm||"-", Over_welke_vraag:waar||"-", email:em||"-", Bericht:msg};
      if(em) payload._replyto=em;
      // vangnet: als de verzenddienst blokkeert (bv. spamfilter) of er is geen verbinding,
      // bieden we een directe mailto-knop aan zodat de melding NOOIT stilletjes verdwijnt.
      function failFallback(reden){
        var body="Feedback Statistiek-tool%0D%0A%0D%0ANaam: "+encodeURIComponent(nm||"-")+"%0D%0AOver welke vraag: "+encodeURIComponent(waar||"-")+"%0D%0AE-mail: "+encodeURIComponent(em||"-")+"%0D%0A%0D%0ABericht:%0D%0A"+encodeURIComponent(msg);
        var mailto="mailto:berat007yildirim@gmail.com?subject="+encodeURIComponent("Statistiek-tool: feedback")+"&body="+body;
        setHTML('<div class="card pad"><h2 style="margin-top:0">Automatisch versturen lukte niet</h2><p class="muted">'+reden+' Geen zorgen — klik hieronder en je melding wordt geopend in je e-mail, helemaal klaar om te versturen:</p><a class="btn" href="'+mailto+'">'+ic("send")+'Mail mijn melding direct</a><div style="margin-top:14px"><button class="btn ghost" id="bk">Terug naar start</button></div></div>');
        document.getElementById("bk").onclick=function(){go("home");};
      }
      fetch("https://formsubmit.co/ajax/Berat007yildirim@gmail.com",{method:"POST",headers:{Accept:"application/json"},body:new URLSearchParams(payload)})
        .then(function(r){return r.json();}).then(function(d){
          if(d&&(d.success===true||d.success==="true")){ setHTML('<div class="card pad results center"><div style="font-size:42px">✅</div><h2 style="margin:6px 0">Bedankt!</h2><p class="muted">Je melding is verstuurd.</p><button class="btn" id="bk" style="margin-top:8px">Terug naar start</button></div>'); document.getElementById("bk").onclick=function(){go("home");}; }
          else { failFallback("Het automatisch versturen lukte niet."); }
        }).catch(function(){ failFallback("Er was even geen verbinding."); });
    };
  }

  document.addEventListener("keydown",function(e){ if(state.key) state.key(e); });
  // bezoeker tellen (1x per toestel)
  try{ if(!localStorage.getItem("socpsy_seen")){ localStorage.setItem("socpsy_seen","1"); bump("berat-socpsy","gebruikers"); } }catch(e){ bump("berat-socpsy","gebruikers"); }
  // traject vanuit de hub overnemen → direct naar de oefenpagina
  try{ var _q=new URLSearchParams(location.search); var _m=_q.get("m");
    if(_m==="training"||_m==="herkansing"){ state.track=_m; lset("socpsy_track",_m);
      var _c=_q.get("calm"); if(_c!=null){ calm=(_c!=="0"); lset("socpsy_calm",calm); applyCalm(); }
      state.step="practice"; state.fromHub=true; }
  }catch(e){}
  render();
  // launch-splash netjes laten verdwijnen
  (function(){ var _sp=document.getElementById("splash"); if(!_sp) return; var _red=false; try{_red=window.matchMedia("(prefers-reduced-motion: reduce)").matches;}catch(e){} setTimeout(function(){ _sp.classList.add("hide"); setTimeout(function(){ if(_sp&&_sp.parentNode) _sp.parentNode.removeChild(_sp); }, 700); }, _red?300:1850); })();
})();
</script>
